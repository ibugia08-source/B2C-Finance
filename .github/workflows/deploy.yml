name: Build and Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      # Sanity build (sem migração de banco) — falha rápido em erro de compilação.
      - name: Build check (CI)
        run: npm run build:ci
        env:
          NODE_ENV: production

      # ===== Deploy de produção via Vercel CLI oficial (build REMOTO) =====
      # Requer os secrets do repositório: VERCEL_TOKEN, VERCEL_ORG_ID,
      # VERCEL_PROJECT_ID. O build roda nos servidores da Vercel (que têm o
      # DATABASE_URL e demais variáveis do projeto), então `prisma migrate
      # deploy` funciona — diferente de buildar localmente no CI. Idempotente.
      - name: Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npm i -g vercel@latest
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
